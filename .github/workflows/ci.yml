---
# Continuous Integration workflow for SpeciesExplorer
# Runs linting and tests on pull requests and pushes

name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  workflow_dispatch:

env:
  PLUGIN_NAME: SpeciesExplorer

jobs:
  # Code quality checks
  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 isort bandit pydocstyle flake8-docstrings

      - name: Check formatting with black
        run: black --check --diff species_explorer test

      - name: Check import sorting with isort
        run: isort --check-only --diff species_explorer test

      - name: Lint with flake8
        run: flake8 species_explorer --config=.flake8

      - name: Security scan with bandit
        run: bandit -r species_explorer -c .bandit.yml || true

  # Run tests against multiple QGIS versions
  test:
    name: Test (QGIS ${{ matrix.qgis_version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        qgis_version: ["3.34", "3.36"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pull QGIS Docker image
        run: docker pull qgis/qgis:release-${{ matrix.qgis_version }}

      - name: Run tests in Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/plugin \
            -w /plugin \
            qgis/qgis:release-${{ matrix.qgis_version }} \
            bash -c "
              pip3 install pytest pytest-cov mock coverage &&
              export QT_QPA_PLATFORM=offscreen &&
              export PYTHONPATH=/plugin:/plugin/species_explorer &&
              python3 -m pytest test/ -v --tb=short || true
            "

  # Pre-commit checks
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure || true
